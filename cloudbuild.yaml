steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'MODEL_SIZES=${_MODEL_SIZES}'
      - '--build-arg'
      - 'MODEL_ID_0_6B=${_MODEL_ID_0_6B}'
      - '--build-arg'
      - 'MODEL_ID_1_7B=${_MODEL_ID_1_7B}'
      - '-t'
      - '${_IMAGE_TAG}'
      - '.'
    timeout: '3600s'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE_TAG}']
substitutions:
  _MODEL_SIZES: '0.6B,1.7B'
  _MODEL_ID_0_6B: 'Qwen/Qwen3-TTS-12Hz-0.6B-Base'
  _MODEL_ID_1_7B: 'Qwen/Qwen3-TTS-12Hz-1.7B-Base'
images:
  - '${_IMAGE_TAG}'
timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_32'
